<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#647a0b">
    <title>AromaMade PRO</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #fff9f6;
            color: #1f2937;
        }

        body {
            align-items: center;
            display: flex;
            justify-content: center;
            margin: 0;
            min-height: 100vh;
            padding: 24px;
        }

        main {
            max-width: 360px;
            text-align: center;
        }

        .logo {
            align-items: center;
            background: #647a0b;
            border-radius: 12px;
            color: #fff;
            display: inline-flex;
            font-size: 20px;
            font-weight: 800;
            height: 56px;
            justify-content: center;
            width: 56px;
        }

        h1 {
            font-size: 22px;
            line-height: 1.2;
            margin: 20px 0 8px;
        }

        p {
            color: #6b7280;
            font-size: 14px;
            line-height: 1.5;
            margin: 0;
        }
    </style>
</head>
<body>
    <main>
        <div class="logo">A</div>
        <h1>AromaMade PRO</h1>
        <p>Connexion au service mobile indisponible. Verifiez votre connexion internet puis relancez l'application.</p>
    </main>
</body>
</html>
